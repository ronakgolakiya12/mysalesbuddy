name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.3']
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mysalesbuddy_test
          POSTGRES_USER: mysalesbuddy
          POSTGRES_PASSWORD: secret
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U mysalesbuddy"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      APP_ENV: testing
      APP_URL: http://localhost
      CACHE_STORE: array
      SESSION_DRIVER: array
      BROADCAST_CONNECTION: 'null'
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      FILESYSTEM_DISK: local
      SANCTUM_STATEFUL_DOMAINS: localhost,127.0.0.1
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: '5432'
      DB_DATABASE: mysalesbuddy_test
      DB_USERNAME: mysalesbuddy
      DB_PASSWORD: secret
      REDIS_HOST: 127.0.0.1
      RECALL_API_KEY: test-recall-key
      RECALL_SIGNING_SECRET: whsec_dGVzdC1zZWNyZXQta2V5LWFiY2RlZmdoaWprbG1ub3A=
      OPENAI_API_KEY: test-openai-key
      GOOGLE_CLIENT_ID: test-google-id
      GOOGLE_CLIENT_SECRET: test-google-secret
      GOOGLE_REDIRECT_URI: http://localhost/api/oauth/google/callback
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_pgsql, pgsql, redis, intl, zip, gd, bcmath, pcntl, posix, pcov
          coverage: pcov

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Enable pg_trgm extension
        run: |
          PGPASSWORD=secret psql -h 127.0.0.1 -U mysalesbuddy -d mysalesbuddy_test -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: Run PHP-CS-Fixer (dry-run)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: Run tests with coverage
        env:
          XDEBUG_MODE: coverage
        run: |
          mkdir -p storage/coverage
          php -d pcov.enabled=1 -d pcov.directory=app vendor/bin/phpunit \
            --coverage-clover=storage/coverage/clover.xml \
            --coverage-html=storage/coverage/html \
            --coverage-text \
            --log-junit=storage/coverage/junit.xml

      - name: Enforce backend coverage threshold (65%)
        run: |
          php -r '
            $xml = simplexml_load_file("storage/coverage/clover.xml");
            $metrics = $xml->project->metrics;
            $statements = (int) $metrics["statements"];
            $covered = (int) $metrics["coveredstatements"];
            $pct = $statements > 0 ? ($covered / $statements) * 100 : 0;
            printf("Backend line coverage: %.2f%% (%d/%d)\n", $pct, $covered, $statements);
            if ($pct < 65.0) {
              fwrite(STDERR, "FAIL: backend coverage is below 65%\n");
              exit(1);
            }
          '

      - name: Upload backend coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: storage/coverage
          retention-days: 14

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    env:
      # laravel-vite-plugin refuses to boot when CI=true (set automatically
      # by GitHub Actions) unless this bypass is set. Applied job-wide so any
      # step that transitively loads vite.config picks it up.
      LARAVEL_BYPASS_ENV_CHECK: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm run type-check

      - run: npm run lint

      - name: Run frontend tests with coverage
        run: npx vitest run --no-file-parallelism --coverage

      - name: Upload frontend coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: storage/coverage/frontend
          retention-days: 14

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Composer audit
        run: composer audit --locked --no-interaction --abandoned=ignore

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: NPM audit
        run: npm audit --audit-level=moderate
        continue-on-error: false
