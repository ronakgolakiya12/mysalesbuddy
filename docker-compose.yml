version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    image: mysalesbuddy/app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      PUSHER_HOST: soketi
    depends_on:
      - postgres
      - redis

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    image: mysalesbuddy/nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  queue_worker:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    image: mysalesbuddy/app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      PUSHER_HOST: soketi
    command: php artisan horizon
    depends_on:
      - app
      - redis

  scheduler:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    image: mysalesbuddy/app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      PUSHER_HOST: soketi
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    depends_on:
      - app

  soketi:
    image: quay.io/soketi/soketi:latest
    environment:
      SOKETI_DEFAULT_APP_ID: ${SOKETI_DEFAULT_APP_ID}
      SOKETI_DEFAULT_APP_KEY: ${SOKETI_DEFAULT_APP_KEY}
      SOKETI_DEFAULT_APP_SECRET: ${SOKETI_DEFAULT_APP_SECRET}
    ports:
      - "6001:6001"
      - "9601:9601"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-mysalesbuddy}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-mysalesbuddy123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  postgres_data: {}
  redis_data: {}
  minio_data: {}
